name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/filesystem @capacitor/share

      - name: Build Vite app
        run: npm run build

      - name: Init Capacitor
        run: npx cap init "Artisanat Stock" "com.artisanat.stock" --web-dir dist

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Add camera permission to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<application|<uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n    <application|' "$MANIFEST"
          echo "Permissions added:"
          grep -E "CAMERA|uses-feature" "$MANIFEST"


      - name: Fix Kotlin duplicate classes
        run: |
          echo "allprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0' force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0' force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0' } } }" >> android/build.gradle

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: artisanat-stock-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
